services:
  api:
    build:
      context: ./backend/apps/api-gateway
      dockerfile: Dockerfile
    container_name: cbec_api_2027
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${CBEC_DATABASE_URL}
      DB_NAME: ${CBEC_DB_NAME:-cbec_sim}
      JWT_SECRET: ${CBEC_JWT_SECRET}
      JWT_ALGORITHM: ${CBEC_JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${CBEC_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      CORS_ALLOW_ORIGINS: ${CBEC_CORS_ALLOW_ORIGINS:-http://112.124.32.196:2027}
      CORS_ALLOW_ORIGIN_REGEX: ${CBEC_CORS_ALLOW_ORIGIN_REGEX:-^https?://(112\\.124\\.32\\.196)(:2027)?$}
      REDIS_CACHE_ENABLE: ${CBEC_REDIS_CACHE_ENABLE:-false}
      REDIS_URL: ${CBEC_REDIS_URL:-redis://host.docker.internal:6379/0}
      REDIS_PREFIX: ${CBEC_REDIS_PREFIX:-cbec}
      REDIS_CACHE_TTL_ORDERS_LIST_SEC: ${CBEC_REDIS_CACHE_TTL_ORDERS_LIST_SEC:-10}
      REDIS_CACHE_TTL_OVERVIEW_SEC: ${CBEC_REDIS_CACHE_TTL_OVERVIEW_SEC:-15}
      REDIS_LOCK_TTL_SEC: ${CBEC_REDIS_LOCK_TTL_SEC:-45}
      REDIS_RATE_LIMIT_ENABLE: ${CBEC_REDIS_RATE_LIMIT_ENABLE:-false}
      REDIS_RATE_LIMIT_SIMULATE_PER_MIN: ${CBEC_REDIS_RATE_LIMIT_SIMULATE_PER_MIN:-5}
      REDIS_RATE_LIMIT_ADMIN_SIMULATE_PER_MIN: ${CBEC_REDIS_RATE_LIMIT_ADMIN_SIMULATE_PER_MIN:-10}
      REDIS_RATE_LIMIT_ORDERS_LIST_PER_MIN: ${CBEC_REDIS_RATE_LIMIT_ORDERS_LIST_PER_MIN:-120}
    restart: always

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${CBEC_VITE_API_BASE_URL:-http://112.124.32.196:2027/api}
    container_name: cbec_web_2027
    ports:
      - "2027:80"
    depends_on:
      - api
    restart: always
